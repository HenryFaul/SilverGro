services:

  # ─── PHP-FPM (Laravel) ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - silvergro
    restart: unless-stopped

  # ─── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - silvergro
    restart: unless-stopped

  # ─── MySQL 8 ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: silvergro
      MYSQL_USER: silvergro
      MYSQL_PASSWORD: silvergro_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"      # exposed on 3307 to avoid conflicts with local MySQL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - silvergro
    restart: unless-stopped

  # ─── Node / Vite dev server ──────────────────────────────────────────────────
  node:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - silvergro
    restart: unless-stopped

networks:
  silvergro:

volumes:
  mysql_data:
