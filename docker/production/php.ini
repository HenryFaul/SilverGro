upload_max_filesize = 40M
post_max_size = 40M
; Raised for memory-hungry Excel imports (phpspreadsheet). Task has 2 GB.
memory_limit = 1024M

; Production error handling — do not leak errors to the browser; logs go to stderr
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

expose_php = Off
